<div class="gf-chart" *ngIf="!empty; else emptyState">
  <svg
    #svg
    class="gf-chart__svg"
    [attr.viewBox]="'0 0 ' + width + ' ' + height"
    preserveAspectRatio="xMidYMid meet"
    role="img"
    (mousemove)="onMove($event, svg)"
    (mouseleave)="onLeave()"
  >
    <g class="gf-chart__grid">
      <line
        *ngFor="let grid of gridLines"
        [attr.x1]="padding.left"
        [attr.x2]="width - padding.right"
        [attr.y1]="grid.y"
        [attr.y2]="grid.y"
      />
    </g>

    <g>
      <text
        *ngFor="let grid of gridLines"
        class="gf-chart__tick"
        [attr.x]="padding.left - 8"
        [attr.y]="grid.y + 4"
        text-anchor="end"
      >
        {{ format(grid.value) }}
      </text>
    </g>

    <line
      class="gf-chart__axis"
      [attr.x1]="padding.left"
      [attr.x2]="width - padding.right"
      [attr.y1]="height - padding.bottom"
      [attr.y2]="height - padding.bottom"
    />

    <g>
      <text
        *ngFor="let tick of xTicks"
        class="gf-chart__tick"
        [attr.x]="tick.x"
        [attr.y]="height - padding.bottom + 16"
        text-anchor="middle"
      >
        {{ tick.label }}
      </text>
    </g>

    <path
      *ngFor="let s of series"
      class="gf-chart__line"
      [attr.d]="pathOf(s)"
      [attr.stroke]="colorOf(s)"
    />

    <!-- The end of each line is marked and direct-labelled: it is where the reader looks, and
         it makes the series identifiable without relying on colour alone. -->
    <ng-container *ngFor="let s of series">
      <ng-container *ngIf="lastPoint(s) as point">
        <circle
          class="gf-chart__marker"
          [attr.cx]="point.x"
          [attr.cy]="point.y"
          r="4"
          [attr.fill]="colorOf(s)"
        />
      </ng-container>
    </ng-container>

    <!-- `!== null` rather than `as index`: index 0 is a real, and very common, hover target,
         and `*ngIf` would treat it as absent. -->
    <ng-container *ngIf="hoverIndex() !== null">
      <line
        class="gf-chart__crosshair"
        [attr.x1]="xOf(hoverIndex()!)"
        [attr.x2]="xOf(hoverIndex()!)"
        [attr.y1]="padding.top"
        [attr.y2]="height - padding.bottom"
      />
      <circle
        *ngFor="let s of series"
        class="gf-chart__marker"
        [attr.cx]="xOf(hoverIndex()!)"
        [attr.cy]="yOf(s.values[hoverIndex()!] || 0)"
        r="4"
        [attr.fill]="colorOf(s)"
      />
    </ng-container>
  </svg>

  <div
    class="gf-chart__tooltip"
    *ngIf="hoverIndex() !== null"
    [style.left]="tooltipLeft(hoverIndex()!)"
    [style.top]="tooltipTop(hoverIndex()!)"
  >
    <div class="gf-chart__tooltip-title">{{ labels[hoverIndex()!] }}</div>
    <div class="gf-chart__tooltip-row" *ngFor="let s of series">
      <span>
        <span class="gf-chart__swatch" [style.background]="colorOf(s)"></span>{{ s.label }}
      </span>
      <strong>{{ format(s.values[hoverIndex()!] || 0) }}</strong>
    </div>
  </div>

  <!-- A single series needs no legend: the panel title names it. -->
  <div class="gf-chart__legend" *ngIf="series.length > 1">
    <span class="gf-chart__legend-item" *ngFor="let s of series">
      <span class="gf-chart__swatch" [style.background]="colorOf(s)"></span>{{ s.label }}
    </span>
  </div>

  <button type="button" class="gf-chart__table-toggle" (click)="toggleTable()">
    {{ showTable() ? ('::GeoForge:Dashboard:HideTable' | abpLocalization) : tableLabel }}
  </button>

  <!-- The table view is the relief for the sub-3:1 palette slots, and the accessible
       representation of the plot. It is not a debugging affordance. -->
  <div class="gf-chart__table table-responsive" *ngIf="showTable()">
    <table class="table table-sm">
      <thead>
        <tr>
          <th scope="col">{{ '::GeoForge:Audit:Timestamp' | abpLocalization }}</th>
          <th scope="col" class="text-end" *ngFor="let s of series">{{ s.label }}</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let label of labels; index as i">
          <th scope="row" class="fw-normal">{{ label }}</th>
          <td class="text-end" *ngFor="let s of series">{{ format(s.values[i] || 0) }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<ng-template #emptyState>
  <div class="gf-chart__empty">{{ emptyMessage }}</div>
</ng-template>
